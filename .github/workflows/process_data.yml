name: Process Data

on:
  schedule:
    - cron: '*/30 * * * *'   # intraday — live AEMO listing only
    - cron: '0 19 * * *'     # daily (5am AEST) — GitHub backfill + DUID/dim_duid refresh
  workflow_dispatch:
    inputs:
      daily_refresh:
        description: 'Run the daily pass (GitHub backfill + DUID refresh)'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: process-data
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  process_data:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ICEBERG_REST_ENDPOINT: ${{ secrets.ICEBERG_REST_ENDPOINT }}
      ICEBERG_TOKEN: ${{ secrets.ICEBERG_TOKEN }}
      ICEBERG_WAREHOUSE: ${{ secrets.ICEBERG_WAREHOUSE }}
      download_limit: "2"
      intraday_download_limit: "60"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dbt-duckdb
      - name: Determine daily-refresh mode
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = "0 19 * * *" ] || [ "${{ github.event.inputs.daily_refresh }}" = "true" ]; then
            echo "daily_refresh=true" >> "$GITHUB_OUTPUT"
          else
            echo "daily_refresh=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Heal orphaned daily log entries (daily pass only)
        if: steps.mode.outputs.daily_refresh == 'true'
        run: dbt run-operation heal_orphaned_daily_files --target prod --profiles-dir .
      - name: Process data
        env:
          daily_refresh: ${{ steps.mode.outputs.daily_refresh }}
        run: dbt run --target prod --profiles-dir .
      - name: Confirm processed log entries
        run: dbt run-operation confirm_log_entries --target prod --profiles-dir .
