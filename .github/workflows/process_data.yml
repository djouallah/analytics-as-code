name: Process Data

on:
  schedule:
    - cron: '*/30 * * * *'   # intraday — live AEMO listing only, no backfill
    - cron: '0 19 * * *'     # daily (5am AEST) — also run GitHub historical backfill
  workflow_dispatch:
    inputs:
      enable_backfill:
        description: 'Run GitHub historical backfill'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: process-data
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  process_data:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ICEBERG_REST_ENDPOINT: ${{ secrets.ICEBERG_REST_ENDPOINT }}
      ICEBERG_TOKEN: ${{ secrets.ICEBERG_TOKEN }}
      ICEBERG_WAREHOUSE: ${{ secrets.ICEBERG_WAREHOUSE }}
      download_limit: "2"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dbt-duckdb
      - name: Determine backfill mode
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = "0 19 * * *" ] || [ "${{ github.event.inputs.enable_backfill }}" = "true" ]; then
            echo "enable_backfill=true" >> "$GITHUB_OUTPUT"
          else
            echo "enable_backfill=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Process data
        env:
          enable_backfill: ${{ steps.mode.outputs.enable_backfill }}
        run: dbt run --target prod --profiles-dir .
      - name: Confirm processed log entries
        run: dbt run-operation confirm_log_entries --target prod --profiles-dir .
