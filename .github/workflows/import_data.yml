name: Import Data

on:
  schedule:
    - cron: '0 20 * * *'  # 6am AEST (UTC+10) — daily full refresh
  workflow_run:
    workflows: ["Process Data"]
    types: [completed]
  workflow_dispatch:  # manual = daily (full refresh)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    env:
      ICEBERG_REST_ENDPOINT: ${{ secrets.ICEBERG_REST_ENDPOINT }}
      ICEBERG_TOKEN: ${{ secrets.ICEBERG_TOKEN }}
      ICEBERG_WAREHOUSE: ${{ secrets.ICEBERG_WAREHOUSE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "is_daily=false" >> $GITHUB_OUTPUT
          else
            echo "is_daily=true" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: |
          # duckdb is pinned here (and ONLY here): import_data builds the .duckdb
          # files deployed to the NemTracker dashboard, whose DuckDB-WASM reader
          # needs a stable on-disk file format. process_data/build only write
          # Iceberg / in-memory CI, so they float on the latest duckdb.
          # Exports use scripts/cache_catalog.py (plain duckdb) -- no dbt needed
          # here; data-quality tests run in test.yml.
          pip install "duckdb==1.5.1"

      # --- Phase 1: Intraday (always) + dims (daily only) → deploy immediately ---
      - name: Export fct_scada_today
        run: python scripts/cache_catalog.py export_scada_today

      - name: Export fct_price_today
        run: python scripts/cache_catalog.py export_price_today

      - name: Build energy_today.duckdb
        run: python scripts/cache_catalog.py build_today

      - name: Export dim_duid
        if: steps.mode.outputs.is_daily == 'true'
        run: python scripts/cache_catalog.py export_dim_duid

      - name: Export dim_calendar
        if: steps.mode.outputs.is_daily == 'true'
        run: python scripts/cache_catalog.py export_dim_calendar

      - name: Build energy_dim.duckdb
        if: steps.mode.outputs.is_daily == 'true'
        run: python scripts/cache_catalog.py build_dim

      - name: Stage data for deploy
        run: |
          mkdir -p deploy_data/data
          cp dashboard/energy_today.duckdb deploy_data/data/
          cp dashboard/metadata.json deploy_data/data/
          if [ "${{ steps.mode.outputs.is_daily }}" = "true" ]; then
            cp dashboard/energy_dim.duckdb deploy_data/data/
          fi
      - name: Deploy to nemtracker (today + dims)
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.NEMTRACKER_TOKEN }}
          external_repository: NemTracker/nemtracker.github.io
          publish_branch: main
          publish_dir: ./deploy_data
          keep_files: true

      # --- Phase 2: Daily full refresh (slow) ---
      - name: Export fct_scada
        if: steps.mode.outputs.is_daily == 'true'
        run: python scripts/cache_catalog.py export_scada

      - name: Export fct_price
        if: steps.mode.outputs.is_daily == 'true'
        run: python scripts/cache_catalog.py export_price

      - name: Build daily databases
        if: steps.mode.outputs.is_daily == 'true'
        run: python scripts/cache_catalog.py build_daily

      - name: Build daily aggregate database
        if: steps.mode.outputs.is_daily == 'true'
        run: python scripts/cache_catalog.py build_daily_agg

      - name: Stage data for deploy (daily)
        if: steps.mode.outputs.is_daily == 'true'
        run: |
          mkdir -p deploy_daily/data
          cp dashboard/energy_data_*.duckdb deploy_daily/data/
          cp dashboard/energy_daily_agg.duckdb deploy_daily/data/
          # NOTE: daily_manifest.json is intentionally NOT deployed here. It is
          # published last (step below) from the period files actually present in
          # the deploy repo, so the manifest can never advertise a file whose
          # .duckdb failed to land in the gh-pages commit (see HISTORY: 2026-07
          # H1->H2 rollover dropped energy_data_2026_h2.duckdb while the manifest
          # still listed it -> dashboard 404).
      - name: Deploy to nemtracker (daily)
        if: steps.mode.outputs.is_daily == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.NEMTRACKER_TOKEN }}
          external_repository: NemTracker/nemtracker.github.io
          publish_branch: main
          publish_dir: ./deploy_daily
          keep_files: true

      # --- Phase 3: Publish manifest LAST, from files actually deployed ---
      - name: Build manifest from deployed files
        if: steps.mode.outputs.is_daily == 'true'
        env:
          GH_TOKEN: ${{ secrets.NEMTRACKER_TOKEN }}
        run: |
          mkdir -p deploy_manifest/data
          # List energy_data_<YYYY>_h<H>.duckdb actually committed in the deploy
          # repo, derive the period tags, and write a manifest of exactly those.
          gh api repos/NemTracker/nemtracker.github.io/contents/data --paginate \
            --jq '.[].name | select(test("^energy_data_[0-9]{4}_h[12]\\.duckdb$")) | capture("^energy_data_(?<tag>[0-9]{4}_h[12])\\.duckdb$").tag' \
            | sort -u > tags.txt
          python - <<'PY'
          import json
          with open("tags.txt") as f:
              tags = [t.strip() for t in f if t.strip()]
          with open("deploy_manifest/data/daily_manifest.json", "w") as f:
              json.dump({"periods": tags}, f)
          print("Manifest:", tags)
          PY
      - name: Deploy manifest to nemtracker
        if: steps.mode.outputs.is_daily == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.NEMTRACKER_TOKEN }}
          external_repository: NemTracker/nemtracker.github.io
          publish_branch: main
          publish_dir: ./deploy_manifest
          keep_files: true

      # Data-quality tests live in their own workflow (.github/workflows/test.yml)
      # so a failing assertion never blocks publishing the dashboard.
